# /etc/nginx/sites-available/tts.conf
# clevertree-tts-server nginx reverse proxy with rate limiting
# CORS is handled by the Express app (src/index.ts), not nginx.

# Rate limit zones
limit_req_zone $binary_remote_addr zone=tts_synth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=tts_api:10m   rate=60r/m;

upstream tts_backend {
    server 127.0.0.1:3100;
}

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS when TLS is set up
    # Uncomment after certbot:
    # return 301 https://$host$request_uri;

    # Common proxy settings
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;

    location = /health {
        limit_req zone=tts_api burst=5 nodelay;
        proxy_pass http://tts_backend;
    }

    location = /voices {
        limit_req zone=tts_api burst=5 nodelay;
        proxy_pass http://tts_backend;
    }

    location = /tts {
        limit_req zone=tts_synth burst=3 nodelay;
        client_max_body_size 64k;
        proxy_read_timeout 30s;
        proxy_pass http://tts_backend;
    }

    # Deny everything else
    location / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }
}
